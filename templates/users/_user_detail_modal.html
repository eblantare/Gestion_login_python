<div class="modal fade" id="detailModal-{{ user.id }}" tabindex="-1" aria-labelledby="detailModalLabel-{{ user.id }}" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header bg-info text-white">
        <h5 class="modal-title" id="detailModalLabel-{{ user.id }}">Détail utilisateur</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fermer"></button>
      </div>
      <div class="modal-body">
        {% if user.photo_filename %}
           <img src="{{ url_for('static', filename='upload/' ~ user.photo_filename) }}" alt="{{ user.nom }}" 
           class="img-fluid rounded mb-3 profile-photo">
        {% endif %}
        <p><strong>Nom :</strong> {{ user.nom }}</p>
        <p><strong>Prénoms :</strong> {{ user.prenoms }}</p>
        <p><strong>Email :</strong> {{ user.email }}</p>
        <p><strong>Téléphone :</strong> {{ user.telephone }}</p>
        <p><strong>Nom d'utilisateur :</strong> {{ user.username }}</p>
        <p><strong>Rôle :</strong> {{ user.role }}</p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fermer</button>
      </div>
    </div>
  </div>
</div>
