<div class="modal fade" id="addClModal">
  <div class="modal-dialog">
    <form id="addClForm" class="modal-content needs-validation" novalidate>
      <div class="modal-header">
        <h5 class="modal-title">Ajouter une classe</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fermer"></button>
      </div>
      <div class="modal-body">
        <input name="code" id="addCl_code" class="form-control mb-2" placeholder="Code (laisser vide pour générer)">
        <input name="nom" class="form-control mb-2" placeholder="Nom" required>
        <input name="effectif" class="form-control mb-2" placeholder="Effectif" type="number" required>

        <!-- Sélection multiple enseignants - VERSION AMÉLIORÉE -->
        <div class="mb-3">
          <label for="addCl_enseignants" class="form-label select-multiple-label">
            Enseignants responsables
            <span class="selection-indicator">
              <span id="addCl_count">0</span> sélectionné(s)
            </span>
          </label>
          
          <select name="enseignants[]" id="addCl_enseignants" class="form-select select-enseignants" multiple size="5">
            {% for enseignant in enseignants %}
              <option value="{{ enseignant.id }}">
                👨‍🏫 {{ enseignant.utilisateur.prenoms }} {{ enseignant.utilisateur.nom }}
                {% if enseignant.matieres %}
                  - {{ enseignant.matieres[0].libelle if enseignant.matieres else '' }}
                {% endif %}
              </option>
            {% endfor %}
          </select>
          
          <!-- Zone d'affichage des sélections -->
          <div id="addCl_selected" class="selected-teachers-container mt-2">
            <!-- Les badges des enseignants sélectionnés apparaîtront ici -->
          </div>
        
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary rounded-pill" data-bs-dismiss="modal">Annuler</button>
        <button type="submit" class="btn btn-success rounded-pill btn-lg">Enregistrer</button>
      </div>
    </form>
  </div>
</div>
